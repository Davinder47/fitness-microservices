spring.application.name=ai-service

server.port=8083
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/fitnessrecommendation}

# Adding the same things for RabbitMQ
spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Adding the same things for RabbitMQ
#Defining exchange
rabbitmq.exchange.name=fitness.exchange
#Defining Queue
rabbitmq.queue.name=activity.queue
#Defining routing key(defines how messages are routed from exchange to queue)
rabbitmq.routing.key=activity.tracking

gemini.api.url=${GEMINI_API_URL}
gemini.api.key=${GEMINI_API_KEY}