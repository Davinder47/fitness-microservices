spring.application.name=activity-service


spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/fitnessactivity}
spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

server.port=8082

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

#Defining exchange
rabbitmq.exchange.name=fitness.exchange
#Defining Queue
rabbitmq.queue.name=activity.queue
#Defining routing key(defines how messages are routed from exchange to queue)
rabbitmq.routing.key=activity.tracking